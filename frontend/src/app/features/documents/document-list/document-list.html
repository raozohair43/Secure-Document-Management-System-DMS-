<div class="space-y-6 animate-fade-in-up">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Documents</h1>
      <p class="text-sm text-gray-500 mt-1">Manage, search, and share your secure files.</p>
    </div>
    
    <div class="flex items-center gap-3 w-full sm:w-auto">
      <div class="relative w-full sm:w-64">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <lucide-icon [img]="SearchIcon" class="w-4 h-4 text-gray-400"></lucide-icon>
        </div>
        <input 
          type="text" 
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearchChange($event)"
          class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 sm:text-sm transition-colors" 
          placeholder="Search documents..."
        >
      </div>

      <button (click)="openUploadModal()" class="flex-shrink-0 flex items-center justify-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none transition-colors">
        <lucide-icon [img]="PlusIcon" class="w-4 h-4 mr-2"></lucide-icon>
        Upload
      </button>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    
    <div *ngIf="isLoading()" class="p-6 space-y-4">
      <div *ngFor="let i of [1,2,3,4,5]" class="animate-pulse flex space-x-4">
        <div class="h-4 bg-gray-200 rounded w-1/4"></div>
        <div class="h-4 bg-gray-200 rounded w-1/4"></div>
        <div class="h-4 bg-gray-200 rounded w-1/4"></div>
      </div>
    </div>

    <div *ngIf="!isLoading() && documents().length > 0" class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Owner</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date Modified</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-100">
          <tr *ngFor="let doc of documents()" class="hover:bg-gray-50 transition-colors group">
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="flex items-center">
                <div class="flex-shrink-0 h-10 w-10 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-600">
                  <lucide-icon [img]="FileIcon" class="w-5 h-5"></lucide-icon>
                </div>
                <div class="ml-4">
                  <div class="text-sm font-medium text-gray-900">{{ doc.title }}</div>
                  <div class="text-xs text-gray-500 uppercase">{{ getFileType(doc) }}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
              {{ doc.owner.name }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
              {{ doc.createdAt | date:'mediumDate' }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <a [routerLink]="['/documents', doc.id]" class="text-indigo-600 hover:text-indigo-900 mr-4 inline-flex items-center opacity-0 group-hover:opacity-100 transition-opacity">
                <lucide-icon [img]="EyeIcon" class="w-4 h-4 mr-1"></lucide-icon> View
              </a>
              <!-- <button class="text-gray-400 hover:text-gray-600 transition-colors">
                <lucide-icon [img]="MoreIcon" class="w-5 h-5"></lucide-icon>
              </button> -->
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="!isLoading() && documents().length === 0" class="px-6 py-16 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-50 mb-4 border border-gray-100">
        <lucide-icon [img]="SearchIcon" class="w-8 h-8 text-gray-300"></lucide-icon>
      </div>
      <h3 class="text-base font-semibold text-gray-900">No documents found</h3>
      <p class="mt-1 text-sm text-gray-500">Try adjusting your search or upload a new file.</p>
    </div>
  </div>
</div>

<app-upload-modal 
  *ngIf="isUploadModalOpen()" 
  (closeModal)="closeUploadModal()"
  (uploadSuccess)="onUploadSuccess()">
</app-upload-modal>
