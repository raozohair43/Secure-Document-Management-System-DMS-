<div class="bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 transition-all">
  <div class="mb-8 text-center lg:text-left">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Create an account</h2>
    <p class="text-sm text-gray-500">Start managing your documents securely today.</p>
  </div>

  <div *ngIf="errorMessage()" class="mb-6 p-4 rounded-lg bg-red-50 border border-red-100 text-sm text-red-600">
    {{ errorMessage() }}
  </div>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
    
    <div class="space-y-2">
      <label class="text-sm font-medium text-gray-700">Full Name</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
          <lucide-icon [img]="UserIcon" class="w-5 h-5"></lucide-icon>
        </div>
        <input 
          type="text" 
          formControlName="name"
          class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200"
          placeholder="John Doe"
        >
      </div>
    </div>

    <div class="space-y-2">
      <label class="text-sm font-medium text-gray-700">Email Address</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
          <lucide-icon [img]="MailIcon" class="w-5 h-5"></lucide-icon>
        </div>
        <input 
          type="email" 
          formControlName="email"
          class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200"
          placeholder="name@company.com"
        >
      </div>
    </div>

    <div class="space-y-2">
      <label class="text-sm font-medium text-gray-700">Password</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
          <lucide-icon [img]="LockIcon" class="w-5 h-5"></lucide-icon>
        </div>
        <input 
          type="password" 
          formControlName="password"
          class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200"
          placeholder="••••••••"
        >
      </div>
    </div>

    <button 
      type="submit" 
      [disabled]="registerForm.invalid || isLoading()"
      class="w-full mt-2 flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
    >
      <lucide-icon *ngIf="isLoading()" [img]="LoaderIcon" class="w-5 h-5 mr-2 animate-spin"></lucide-icon>
      {{ isLoading() ? 'Creating account...' : 'Create account' }}
    </button>
  </form>

  <p class="mt-8 text-center text-sm text-gray-600">
    Already have an account? 
    <a routerLink="/auth/login" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">Sign in here</a>
  </p>
</div>
