<div class="space-y-6 animate-fade-in-up">
  
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-900 flex items-center">
        <lucide-icon [img]="UsersIcon" class="w-6 h-6 mr-2 text-indigo-600"></lucide-icon>
        User Management
      </h1>
      <p class="text-sm text-gray-500 mt-1">Manage system users, roles, and access levels.</p>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    
    <div *ngIf="isLoading()" class="p-6 space-y-4">
      <div *ngFor="let i of [1,2,3,4]" class="animate-pulse flex space-x-4">
        <div class="h-10 w-10 bg-gray-200 rounded-full"></div>
        <div class="flex-1 space-y-2 py-1">
          <div class="h-4 bg-gray-200 rounded w-1/4"></div>
          <div class="h-3 bg-gray-200 rounded w-1/3"></div>
        </div>
      </div>
    </div>

    <div *ngIf="!isLoading() && users().length > 0" class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-100">
          <tr *ngFor="let user of users()" class="hover:bg-gray-50 transition-colors">
            
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="flex items-center">
                <div class="flex-shrink-0 h-10 w-10 rounded-full flex items-center justify-center font-bold border"
                     [ngClass]="user.role === 'Admin' ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-indigo-50 text-indigo-700 border-indigo-200'">
                  {{ user.name.charAt(0) }}
                </div>
                <div class="ml-4">
                  <div class="text-sm font-medium text-gray-900 flex items-center">
                    {{ user.name }}
                    <span *ngIf="user.id === currentUser()?.id" class="ml-2 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800">
                      You
                    </span>
                  </div>
                  <div class="text-sm text-gray-500 flex items-center mt-0.5">
                    <lucide-icon [img]="MailIcon" class="w-3 h-3 mr-1"></lucide-icon> {{ user.email }}
                  </div>
                </div>
              </div>
            </td>

            <td class="px-6 py-4 whitespace-nowrap">
              <div class="flex items-center">
                <lucide-icon *ngIf="user.role === 'Admin'" [img]="AdminIcon" class="w-4 h-4 mr-2 text-amber-500"></lucide-icon>
                <lucide-icon *ngIf="user.role === 'Employee'" [img]="ShieldIcon" class="w-4 h-4 mr-2 text-gray-400"></lucide-icon>
                
                <select 
                  [ngModel]="user.role" 
                  (ngModelChange)="changeRole(user.id, $event)"
                  [disabled]="user.id === currentUser()?.id"
                  class="text-sm bg-transparent border-none focus:ring-0 cursor-pointer hover:bg-gray-50 rounded-md py-1 px-2 font-medium"
                  [ngClass]="user.role === 'Admin' ? 'text-amber-700' : 'text-gray-700'"
                >
                  <option value="Employee">Employee</option>
                  <option value="Admin">Admin</option>
                </select>
              </div>
            </td>

            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <button 
                (click)="deleteUser(user)" 
                [disabled]="user.id === currentUser()?.id"
                class="text-gray-400 hover:text-red-600 transition-colors p-2 rounded-lg hover:bg-red-50 disabled:opacity-30 disabled:hover:bg-transparent disabled:hover:text-gray-400 tooltip-trigger" 
                title="Remove User">
                <lucide-icon [img]="TrashIcon" class="w-5 h-5"></lucide-icon>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="!isLoading() && users().length === 0" class="px-6 py-12 text-center">
      <p class="text-sm text-gray-500">No users found.</p>
    </div>
  </div>
</div>
