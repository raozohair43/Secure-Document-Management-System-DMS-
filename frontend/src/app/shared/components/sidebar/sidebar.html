<div *ngIf="isOpen" class="fixed inset-0 bg-gray-900/50 z-40 lg:hidden" (click)="closeSidebar()"></div>

    <aside 
      class="fixed top-0 left-0 z-50 h-screen w-64 bg-slate-900 text-slate-300 transition-transform duration-300 ease-in-out flex flex-col"
      [class.-translate-x-full]="!isOpen"
      [class.lg:translate-x-0]="true"
    >
      <div class="h-16 flex items-center justify-between px-6 border-b border-slate-800">
        <span class="text-xl font-bold text-white tracking-wide">SecureDocs</span>
        <button class="lg:hidden text-slate-400 hover:text-white" (click)="closeSidebar()">
          <lucide-icon [img]="XIcon" class="w-6 h-6"></lucide-icon>
        </button>
      </div>

      <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
        <a routerLink="/dashboard" routerLinkActive="bg-indigo-600 text-white" class="flex items-center px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition-colors group">
          <lucide-icon [img]="DashboardIcon" class="w-5 h-5 mr-3 flex-shrink-0 group-[.active]:text-white"></lucide-icon>
          Dashboard
        </a>
        <a routerLink="/documents" routerLinkActive="bg-indigo-600 text-white" class="flex items-center px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition-colors group">
          <lucide-icon [img]="FilesIcon" class="w-5 h-5 mr-3 flex-shrink-0 group-[.active]:text-white"></lucide-icon>
          Documents
        </a>

        <ng-container *ngIf="isAdmin()">
          <div class="mt-6 mb-2 px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Admin Panel</div>
          <a routerLink="/users" routerLinkActive="bg-indigo-600 text-white" class="flex items-center px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition-colors group">
            <lucide-icon [img]="UsersIcon" class="w-5 h-5 mr-3 flex-shrink-0 group-[.active]:text-white"></lucide-icon>
            User Management
          </a>
          <a routerLink="/audit-logs" routerLinkActive="bg-indigo-600 text-white" class="flex items-center px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition-colors group">
            <lucide-icon [img]="ActivityIcon" class="w-5 h-5 mr-3 flex-shrink-0 group-[.active]:text-white"></lucide-icon>
            Audit Logs
          </a>
        </ng-container>
      </nav>
    </aside>
