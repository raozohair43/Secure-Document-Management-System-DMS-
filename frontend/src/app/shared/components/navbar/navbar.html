<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-6 lg:px-8 z-30 sticky top-0 shadow-sm">
      <button class="lg:hidden text-gray-500 hover:text-gray-700 focus:outline-none" (click)="onToggleMenu()">
        <lucide-icon [img]="MenuIcon" class="w-6 h-6"></lucide-icon>
      </button>

      <div class="flex-1"></div> <div class="flex items-center space-x-4">
        <div class="hidden sm:flex flex-col items-end">
          <span class="text-sm font-medium text-gray-900">{{ user()?.name }}</span>
          <span class="text-xs text-gray-500">{{ user()?.role }}</span>
        </div>
        
        <div class="h-8 w-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 border border-indigo-200">
          <lucide-icon [img]="UserIcon" class="w-4 h-4"></lucide-icon>
        </div>

        <button (click)="logout()" class="ml-4 text-gray-400 hover:text-red-600 transition-colors tooltip-trigger" title="Logout">
          <lucide-icon [img]="LogOutIcon" class="w-5 h-5"></lucide-icon>
        </button>
      </div>
    </header>
