<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm animate-fade-in-up">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden flex flex-col">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
          <h3 class="text-lg font-semibold text-gray-900">Upload Document</h3>
          <button (click)="close()" class="text-gray-400 hover:text-gray-600 transition-colors">
            <lucide-icon [img]="XIcon" class="w-5 h-5"></lucide-icon>
          </button>
        </div>

        <div class="p-6 flex-1">
          <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">Document Title</label>
            <input type="text" [(ngModel)]="documentTitle" placeholder="e.g., Q3 Financial Report"
              class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
          </div>

          <div 
            class="border-2 border-dashed rounded-xl p-8 text-center transition-colors relative"
            [class.border-indigo-500]="isDragging()"
            [class.bg-indigo-50]="isDragging()"
            [class.border-gray-300]="!isDragging()"
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)"
          >
            <input type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" (change)="onFileSelected($event)">
            
            <div *ngIf="!selectedFile()" class="pointer-events-none">
              <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3">
                <lucide-icon [img]="UploadIcon" class="w-6 h-6"></lucide-icon>
              </div>
              <p class="text-sm font-medium text-gray-900">Click or drag file to this area to upload</p>
              <p class="text-xs text-gray-500 mt-1">Support for a single or bulk upload.</p>
            </div>

            <div *ngIf="selectedFile()" class="pointer-events-none flex flex-col items-center">
              <lucide-icon [img]="FileIcon" class="w-8 h-8 text-indigo-500 mb-2"></lucide-icon>
              <p class="text-sm font-medium text-gray-900">{{ selectedFile()?.name }}</p>
              <p class="text-xs text-gray-500 mt-1">{{ (selectedFile()?.size || 0) / 1024 / 1024 | number:'1.2-2' }} MB</p>
            </div>
          </div>

          <p *ngIf="errorMessage()" class="text-sm text-red-600 mt-3">{{ errorMessage() }}</p>
        </div>

        <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end space-x-3">
          <button (click)="close()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
          <button (click)="upload()" [disabled]="!selectedFile() || !documentTitle || isUploading()" 
            class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors disabled:opacity-50 flex items-center">
            <lucide-icon *ngIf="isUploading()" [img]="LoaderIcon" class="w-4 h-4 mr-2 animate-spin"></lucide-icon>
            {{ isUploading() ? 'Uploading...' : 'Upload File' }}
          </button>
        </div>
      </div>
    </div>
